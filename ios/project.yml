name: TheNeckApp
options:
  bundleIdPrefix: com.ioan
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  TheNeckApp:
    type: application
    platform: iOS
    sources:
      - path: TheNeckApp
    entitlements:
      path: TheNeckApp/TheNeckApp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ioan.theneckapp
        DEVELOPMENT_TEAM: VRHVJF3T9G
        CODE_SIGN_ENTITLEMENTS: TheNeckApp/TheNeckApp.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMotionUsageDescription: "Pentru a măsura unghiul de flexie al gâtului în timpul utilizării telefonului."
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIBackgroundModes: "fetch processing"
        TARGETED_DEVICE_FAMILY: "1"

  TheNeckAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TheNeckAppTests
    dependencies:
      - target: TheNeckApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ioan.theneckapp.tests
        GENERATE_INFOPLIST_FILE: YES
